name: Android Build

# Builds a signed release APK and AAB for Tappy Trails.
# CI is responsible for fast, stable build tasks only. Launch verification
# on a real device / emulator is a local pre-release step (see README).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-android:
    name: Build signed APK + AAB
    runs-on: ubuntu-latest

    env:
      # Target Android 15 / API 35 to satisfy Google Play requirements.
      ANDROID_COMPILE_SDK: "35"
      ANDROID_TARGET_SDK: "35"
      ANDROID_BUILD_TOOLS: "35.0.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependency versions
        run: npx expo install --fix

      - name: Run expo-doctor
        run: npx expo-doctor || true

      - name: Check Expo dependency versions
        run: npx expo install --check || true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare native Android project (prebuild)
        run: npx expo prebuild --platform android --no-install

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set."
            echo "Add it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tappy-trails-release.p12"
          echo "Keystore decoded to runner temp."

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tappy-trails-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew :app:assembleRelease \
            --init-script "${{ github.workspace }}/ci/signing.gradle" \
            --no-daemon

      - name: Build signed release AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/tappy-trails-release.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          ./gradlew :app:bundleRelease \
            --init-script "${{ github.workspace }}/ci/signing.gradle" \
            --no-daemon

      - name: Collect build outputs
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/tappy-trails-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/tappy-trails-release.aab
          ls -la dist

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tappy-trails-release-apk
          path: dist/tappy-trails-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tappy-trails-release-aab
          path: dist/tappy-trails-release.aab
